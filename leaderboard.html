<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JaskullTV — Contexto Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root{--tw:#9146FF;--tw-light:#bf94ff;--tw-dark:#6a2fc2;--ctx-green:#3dd68c;--ctx-teal:#1ab0a0;--gold:#FFD700;--gold-dark:#B8860B;--silver:#C0C0C0;--silver-dark:#808080;--bronze:#CD7F32;--bronze-dark:#8B4513;--bg:#0e0e18;--border:rgba(145,70,255,0.2);--border-light:rgba(255,255,255,0.07);--text:#f0f0ff;--muted:#8888a8;--radius:18px}
    *{box-sizing:border-box;margin:0;padding:0}
    html{width:100%;height:100%;overflow:hidden;background:var(--bg)}
    body{width:1920px;height:1080px;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);transform-origin:top left}
    #root{width:1920px;height:1080px}

    .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
    .bg-gradient{position:absolute;inset:-150px;background:radial-gradient(ellipse 1000px 700px at 20% 30%,rgba(145,70,255,0.15),transparent),radial-gradient(ellipse 800px 600px at 80% 70%,rgba(61,214,140,0.1),transparent);animation:gd 20s ease-in-out infinite alternate;filter:blur(60px)}
    @keyframes gd{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.03)}100%{transform:translate(-25px,40px) scale(0.98)}}
    .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(145,70,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(145,70,255,0.025) 1px,transparent 1px);background-size:80px 80px;animation:gp 40s linear infinite}
    @keyframes gp{0%{transform:translate(0,0)}100%{transform:translate(80px,80px)}}
    .beam-h{position:fixed;z-index:1;pointer-events:none;top:78px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,transparent 20%,rgba(145,70,255,0.4),rgba(61,214,140,0.3),rgba(255,215,0,0.2),transparent 80%,transparent);background-size:600px 2px;animation:bh 4s linear infinite}
    @keyframes bh{0%{background-position:-600px 0}100%{background-position:1920px 0}}

    .page{position:relative;z-index:2;width:1920px;height:1080px;display:grid;grid-template-columns:1fr 400px;grid-template-rows:80px 1fr;gap:12px;padding:12px}

    .topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);position:relative;overflow:hidden}
    .topbar::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--tw),var(--ctx-green),var(--gold),var(--tw),transparent);background-size:800px 2px;animation:sh 3s linear infinite}
    .topbar::after{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(145,70,255,0.4),transparent);animation:tg 2s ease-in-out infinite alternate}
    @keyframes sh{0%{background-position:-800px 0}100%{background-position:800px 0}}
    @keyframes tg{0%{opacity:0.3}100%{opacity:1}}
    .topbar-left{display:flex;align-items:center;gap:14px}
    .twitch-badge{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 8px;background:rgba(145,70,255,0.15);border:1px solid rgba(145,70,255,0.3);border-radius:12px}
    .twitch-badge svg{width:22px;height:22px}
    .twitch-badge span{font-weight:800;font-size:15px;color:var(--tw-light)}
    .live-ind{display:flex;align-items:center;gap:6px;padding:4px 12px;background:rgba(255,60,60,0.15);border:1px solid rgba(255,60,60,0.3);border-radius:10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:#ff6b6b}
    .live-dot{width:8px;height:8px;border-radius:50%;background:#ff4444;animation:lp 1.4s infinite}
    @keyframes lp{0%,100%{opacity:1}50%{opacity:0.3}}
    .topbar-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:16px}
    .topbar-title{font-family:'Bebas Neue';font-size:38px;letter-spacing:0.08em;line-height:1}
    .t-community{color:var(--tw-light)}
    .t-ctx{background:linear-gradient(135deg,var(--ctx-green),var(--ctx-teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .topbar-clock{font-family:'Orbitron';font-size:13px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}

    .main{display:flex;flex-direction:column;gap:12px;overflow:hidden}
    .podium-big{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:14px;padding:10px;align-items:end;flex-shrink:0}
    .pod-big{position:relative;border-radius:24px;padding:20px 16px;text-align:center;overflow:hidden}
    .pod-big::after{content:'';position:absolute;inset:0;border-radius:24px;padding:1px;background:linear-gradient(180deg,rgba(255,255,255,0.1),rgba(255,255,255,0.01));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
    .pod-big.first{min-height:320px;background:linear-gradient(180deg,rgba(255,215,0,0.1),rgba(255,215,0,0.02));border:1px solid rgba(255,215,0,0.25)}
    .pod-big.second{min-height:260px;background:linear-gradient(180deg,rgba(192,192,192,0.08),rgba(192,192,192,0.01));border:1px solid rgba(192,192,192,0.18)}
    .pod-big.third{min-height:230px;background:linear-gradient(180deg,rgba(205,127,50,0.08),rgba(205,127,50,0.01));border:1px solid rgba(205,127,50,0.18)}
    .pod-big .trophy svg{width:70px;height:70px;margin-bottom:8px}
    .pod-big.first .trophy svg{width:90px;height:90px;filter:drop-shadow(0 4px 20px rgba(255,215,0,0.5))}
    .pod-big.second .trophy svg{filter:drop-shadow(0 4px 14px rgba(192,192,192,0.35))}
    .pod-big.third .trophy svg{filter:drop-shadow(0 4px 14px rgba(205,127,50,0.35))}
    .pod-big .pod-avatar{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.15);margin:0 auto 8px;display:block;box-shadow:0 6px 20px rgba(0,0,0,0.4)}
    .pod-big.first .pod-avatar{width:90px;height:90px;border-color:rgba(255,215,0,0.45);box-shadow:0 6px 25px rgba(255,215,0,0.25)}
    .pod-big.second .pod-avatar{border-color:rgba(192,192,192,0.35)}
    .pod-big.third .pod-avatar{border-color:rgba(205,127,50,0.35)}
    .pod-big .pod-name{font-weight:900;font-size:28px;line-height:1.1;word-break:break-word;text-shadow:0 3px 12px rgba(0,0,0,0.4);margin-bottom:6px}
    .pod-big.first .pod-name{font-size:36px}
    .pod-big .pod-wins{font-size:14px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);font-weight:700}
    .pod-big .pod-wins strong{display:inline-block;margin-left:4px;font-size:36px;letter-spacing:0}
    .pod-big.first .pod-wins strong{color:var(--gold);font-size:44px}
    .pod-big.second .pod-wins strong{color:var(--silver)}
    .pod-big.third .pod-wins strong{color:var(--bronze)}
    .avatar-fallback{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;user-select:none;flex-shrink:0}

    .player-list-wrap{flex:1;min-height:0;overflow:hidden;border-radius:var(--radius);border:1px solid var(--border);background:rgba(14,14,24,0.9)}
    .player-list-header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border-light);background:rgba(0,0,0,0.3)}
    .player-list-header span{font-size:11px;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);font-weight:700}
    .player-list{overflow-y:auto;padding:8px 12px;height:calc(100% - 42px);scrollbar-width:thin;scrollbar-color:rgba(145,70,255,0.2) transparent}
    .player-list::-webkit-scrollbar{width:6px}
    .player-list::-webkit-scrollbar-track{background:transparent}
    .player-list::-webkit-scrollbar-thumb{background:rgba(145,70,255,0.25);border-radius:3px}
    .p-row{display:grid;grid-template-columns:40px 36px 1fr auto;align-items:center;gap:10px;padding:8px 12px;border-radius:14px;border:1px solid transparent;transition:background 0.2s;margin-bottom:4px}
    .p-row:hover{background:rgba(145,70,255,0.06);border-color:var(--border-light)}
    .p-row-rank{width:34px;height:34px;display:grid;place-items:center;border-radius:10px;font-weight:900;font-size:14px;background:rgba(145,70,255,0.1);border:1px solid rgba(145,70,255,0.15);color:var(--tw-light)}
    .p-row .avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.12);background:rgba(145,70,255,0.15)}
    .p-row-name{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .p-row-score{font-size:18px;font-weight:900;color:var(--tw-light);padding-right:4px}

    .right-col{display:flex;flex-direction:column;gap:12px}
    .webcam-frame{position:relative;width:100%;aspect-ratio:16/9;border-radius:var(--radius);border:none;background:transparent;overflow:visible;flex-shrink:0}
    .webcam-frame::before{content:'';position:absolute;inset:-3px;border-radius:calc(var(--radius) + 2px);padding:2px;background:linear-gradient(135deg,var(--tw),var(--ctx-green),var(--gold),var(--tw));background-size:400% 400%;animation:bf 5s ease infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}
    @keyframes bf{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .chat-frame{flex:1;min-height:0;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);overflow:hidden;position:relative}
    .chat-frame::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--tw),transparent)}
    .chat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border-light);background:rgba(0,0,0,0.3)}
    .chat-header svg{width:16px;height:16px;color:var(--tw-light)}
    .chat-header span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted)}
    .chat-clock{margin-left:auto;font-family:'Orbitron';font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;opacity:0.7}
    .error-box{padding:20px;margin:20px;border-radius:16px;border:1px dashed rgba(145,70,255,0.2);background:rgba(0,0,0,0.3);color:var(--muted);font-size:14px;text-align:center}
    .error-box strong{color:#ff6b6b}
  </style>
</head>
<body>
  <div class="bg-layer"><div class="bg-gradient"></div><div class="bg-grid"></div></div>
  <div class="beam-h"></div>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback}=React;
    const GITHUB_USER='DaveC0de',GITHUB_REPO='contexto-overlay';
    const TXT_URL=`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/leaderboard.txt`;
    const REFRESH_MS=1800000;

    function nameToHue(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return Math.abs(h)%360}
    const avC={};
    async function rAv(u){const k=u.toLowerCase().trim();if(avC[k]!==undefined)return avC[k];try{const r=await fetch(`https://decapi.me/twitch/avatar/${encodeURIComponent(k.replace(/\s+/g,''))}`,{cache:'no-store'});if(!r.ok){avC[k]=null;return null}const t=(await r.text()).trim();if(t.startsWith('http')){avC[k]=t;return t}avC[k]=null;return null}catch{avC[k]=null;return null}}
    async function rAll(ps){const m={};await Promise.all(ps.map(async p=>{m[p.name]=await rAv(p.name)}));return m}
    function fetchLB(){return fetch(TXT_URL,{headers:{'Accept':'application/vnd.github.v3+json'},cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(j=>parseLB(atob(j.content)))}
    function parseLB(t){return t.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#')).map(l=>{const p=l.split('|');if(p.length<2)return null;const n=p[0].trim(),s=Number(p[1].trim());if(!n||isNaN(s))return null;return{name:n,score:s}}).filter(Boolean).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name,'it'))}

    function TrophySVG({type}){const C={gold:{m:'#FFD700',d:'#B8860B',s:'#FFF8DC'},silver:{m:'#C0C0C0',d:'#808080',s:'#F0F0F0'},bronze:{m:'#CD7F32',d:'#8B4513',s:'#DEB887'}}[type];return<svg viewBox="0 0 64 64" fill="none"><path d="M16 8h32v6c0 12-6 22-16 26-10-4-16-14-16-26V8z" fill={C.m} stroke={C.d} strokeWidth="1.5"/><path d="M20 12h8v4c0 8-2 14-6 18-2-4-3-10-3-18v-4z" fill={C.s} opacity="0.4"/><path d="M16 14H10c-2 0-4 2-4 4v2c0 4 3 8 7 9l3-1" stroke={C.d} strokeWidth="2" fill="none"/><path d="M48 14h6c2 0 4 2 4 4v2c0 4-3 8-7 9l-3-1" stroke={C.d} strokeWidth="2" fill="none"/><rect x="28" y="40" width="8" height="8" rx="1" fill={C.d}/><rect x="20" y="48" width="24" height="6" rx="3" fill={C.m} stroke={C.d} strokeWidth="1"/><path d="M32 16l2.5 5 5.5.8-4 3.9.9 5.5L32 28.7l-4.9 2.5.9-5.5-4-3.9 5.5-.8z" fill={C.s} opacity="0.6"/></svg>}

    function Avatar({name,url,size=32,className='avatar'}){if(url)return<img className={className} src={url} alt="" style={{width:size,height:size}} loading="lazy"/>;const h=nameToHue(name);return<div className={`${className} avatar-fallback`} style={{width:size,height:size,background:`hsl(${h},50%,30%)`,color:`hsl(${h},70%,75%)`,fontSize:size*0.42}}>{(name||'?')[0].toUpperCase()}</div>}

    function BigPod({player,rank,avatarMap}){const cls=rank===1?'first':rank===2?'second':'third',type=rank===1?'gold':rank===2?'silver':'bronze';if(!player)return<div className={`pod-big ${cls}`}/>;return<div className={`pod-big ${cls}`}><div className="trophy"><TrophySVG type={type}/></div><Avatar name={player.name} url={avatarMap[player.name]} size={rank===1?90:72} className="pod-avatar"/><div className="pod-name">{player.name}</div><div className="pod-wins">Wins <strong>{player.score}</strong></div></div>}

    function PlayerRow({player,rank,avatarMap}){return<div className="p-row"><div className="p-row-rank">#{rank}</div><Avatar name={player.name} url={avatarMap[player.name]} size={32}/><div className="p-row-name">{player.name}</div><div className="p-row-score">{player.score}</div></div>}

    function App(){
      const[players,setPlayers]=useState([]);
      const[avatarMap,setAvatarMap]=useState({});
      const[error,setError]=useState(null);
      const[lastUpdate,setLastUpdate]=useState('');
      const[clock,setClock]=useState('');
      const doRefresh=useCallback(async()=>{try{const data=await fetchLB();if(!data.length)return;const avs=await rAll(data);setAvatarMap(p=>({...p,...avs}));setPlayers(data);setError(null);setLastUpdate(new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}))}catch(e){setError(e.message)}},[]);
      useEffect(()=>{doRefresh();const iv=setInterval(doRefresh,REFRESH_MS);return()=>clearInterval(iv)},[doRefresh]);
      useEffect(()=>{const t=()=>setClock(new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));t();const iv=setInterval(t,1000);return()=>clearInterval(iv)},[]);
      const top3=[players[0]||null,players[1]||null,players[2]||null],rest=players.slice(3);
      return<div className="page">
        <div className="topbar">
          <div className="topbar-left">
            <div className="twitch-badge"><svg viewBox="0 0 256 268" fill="none"><path d="M17.458 0L0 46.556v185.81h63.983v35.334h37.776L139.538 267.7h53.768l71.694-71.693V0H17.458zm230.77 182.465l-45.313 45.312h-67.36l-37.776 37.777v-37.777H44.525V22.683h203.703v159.782z" fill="#9146FF"/><path d="M107.54 66.234h22.682v67.36H107.54v-67.36zm62.74 0h22.682v67.36H170.28v-67.36z" fill="#9146FF"/></svg><span>/JaskullTV</span></div>
            <div className="live-ind"><div className="live-dot"/><span>Live</span></div>
          </div>
          <div className="topbar-center"><div className="topbar-title"><span className="t-community">Community Leaderboard </span><span className="t-ctx">Contexto</span></div></div>
          <div className="topbar-right"><div className="topbar-clock">{clock}</div></div>
        </div>
        <div className="main">
          {error?<div className="error-box"><strong>Errore:</strong> {error}</div>:<>
            <div className="podium-big">
              <BigPod player={top3[1]} rank={2} avatarMap={avatarMap}/>
              <BigPod player={top3[0]} rank={1} avatarMap={avatarMap}/>
              <BigPod player={top3[2]} rank={3} avatarMap={avatarMap}/>
            </div>
            <div className="player-list-wrap">
              <div className="player-list-header"><span>Classifica completa</span><span>Agg. {lastUpdate} · Refresh 30min</span></div>
              <div className="player-list">
                {rest.map((p,i)=><PlayerRow key={p.name} player={p} rank={i+4} avatarMap={avatarMap}/>)}
                {rest.length===0&&<div style={{textAlign:'center',padding:20,color:'var(--muted)'}}>Nessun altro giocatore</div>}
              </div>
            </div>
          </>}
        </div>
        <div className="right-col">
          <div className="webcam-frame"/>
          <div className="chat-frame">
            <div className="chat-header">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
              <span>Twitch Chat</span>
              <span className="chat-clock">{clock}</span>
            </div>
          </div>
        </div>
      </div>
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    function sc(){const sx=window.innerWidth/1920,sy=window.innerHeight/1080,s=Math.min(sx,sy);if(Math.abs(s-1)<0.01){document.body.style.transform='none';document.body.style.margin='0';return}document.body.style.transform=`scale(${s})`;document.body.style.transformOrigin='top left';document.body.style.marginLeft=Math.max(0,(window.innerWidth-1920*s)/2)+'px';document.body.style.marginTop=Math.max(0,(window.innerHeight-1080*s)/2)+'px'}
    sc();window.addEventListener('resize',sc);
  </script>
</body>
</html>
